syntax = "proto3";

package commerce.events.inventory;

option java_package = "com.rodminjo.commerce.events.inventory";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

message InventoryReleased {
  string order_id = 1;
  string reason = 2;
  google.protobuf.Timestamp occurred_at = 3;
}
