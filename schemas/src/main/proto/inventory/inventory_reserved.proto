syntax = "proto3";

package commerce.events.inventory;

option java_package = "com.rodminjo.commerce.events.inventory";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

message InventoryReserved {
  string order_id = 1;
  repeated ReservedItem items = 2;
  google.protobuf.Timestamp occurred_at = 3;
}

message ReservedItem {
  string product_id = 1;
  int32 quantity = 2;
}
