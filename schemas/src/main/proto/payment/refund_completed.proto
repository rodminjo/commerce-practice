syntax = "proto3";

package commerce.events.payment;

option java_package = "com.rodminjo.commerce.events.payment";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

message RefundCompleted {
  string order_id = 1;
  string payment_id = 2;
  string refund_id = 3;
  int64 refunded_amount_minor = 4;
  google.protobuf.Timestamp occurred_at = 5;
}
