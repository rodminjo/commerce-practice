syntax = "proto3";

package commerce.events.payment;

option java_package = "com.rodminjo.commerce.events.payment";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

message RefundFailed {
  string order_id = 1;
  string refund_id = 2;
  string reason = 3;
  google.protobuf.Timestamp occurred_at = 4;
}
